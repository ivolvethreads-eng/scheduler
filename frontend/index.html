<!DOCTYPE html>
<html>
<head>
  <title>Syncra</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-3xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-xl font-bold">Syncra</h1>
      <p class="text-sm text-gray-500">by Vanto</p>
    </div>

    <!-- HERO -->
    <div class="bg-white p-6 rounded-2xl shadow mb-6">
      <h2 class="text-2xl font-bold mb-2">
        Are your meetings unfair across timezones?
      </h2>
      <p class="text-gray-600">
        See who’s taking the hit — and fix it instantly.
      </p>
    </div>

    <!-- INPUT CARD -->
    <div class="bg-white p-6 rounded-2xl shadow mb-6">

      <div id="members"></div>

      <button onclick="addMember()" class="bg-gray-200 px-3 py-1 rounded mb-4">
        + Add Member
      </button>

      <br>

      <button onclick="run()" class="bg-black text-white px-4 py-2 rounded w-full">
        Check Fairness
      </button>

    </div>

    <!-- OUTPUT -->
    <div id="output" class="space-y-4"></div>

  </div>

<script>

const timezones = Intl.supportedValuesOf('timeZone');

function setupTimezoneSearch() {
  document.querySelectorAll(".timezone-input").forEach((input) => {

    const list = input.nextElementSibling;

    input.addEventListener("input", () => {
      const value = input.value.toLowerCase();
      list.innerHTML = "";

      if (!value) {
        list.classList.add("hidden");
        return;
      }

      const filtered = timezones.filter(tz =>
        tz.toLowerCase().includes(value)
      ).slice(0, 20);

      filtered.forEach(tz => {
        const item = document.createElement("div");
        item.className = "p-1 hover:bg-gray-200 cursor-pointer";
        item.innerText = tz;

        item.onclick = () => {
          input.value = tz;
          list.classList.add("hidden");
        };

        list.appendChild(item);
      });

      list.classList.remove("hidden");
    });

    input.addEventListener("blur", () => {
      setTimeout(() => list.classList.add("hidden"), 200);
    });

  });
}

function addMember(name="", timezone="", start="09:00", end="17:00") {
  const container = document.getElementById("members");

  const div = document.createElement("div");
  div.className = "border p-3 mb-3 rounded";

  div.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <p class="font-semibold">Member</p>
      <button onclick="this.closest('div').parentElement.remove()" 
        class="text-red-500 text-sm">
        Remove
      </button>
    </div>

    <input placeholder="Name" value="${name}" class="border p-1 mr-2 mb-2 w-full" />
    
    <input 
      type="text"
      placeholder="Search timezone..."
      value="${timezone}"
      class="border p-1 mr-2 timezone-input mb-2 w-full"
    />
    <div class="bg-white border mt-1 hidden max-h-40 overflow-y-auto timezone-list"></div>

    <div class="flex gap-2">
      <input type="time" value="${start}" class="border p-1 w-full" />
      <input type="time" value="${end}" class="border p-1 w-full" />
    </div>
  `;

  container.appendChild(div);
  setupTimezoneSearch();
}

// default users
addMember("Alex", "Asia/Kolkata");
addMember("John", "America/New_York");

async function run() {
  const membersDiv = document.getElementById("members").children;
  let data = [];

  for (let div of membersDiv) {
    const inputs = div.getElementsByTagName("input");

    const name = inputs[0].value.trim();
    const timezone = inputs[1].value.trim();
    const start = inputs[2].value;
    const end = inputs[3].value;

    if (!name || !timezone) continue;

    data.push({ name, timezone, start, end });
  }

  if (data.length < 2) {
    alert("Please add at least 2 valid members");
    return;
  }

  const res = await fetch("https://scheduler-production-06a7.up.railway.app/schedule", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  let html = "";

  const firstPerson = data[0].name;

  // 🔴 CURRENT
  html += `
    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-red-500">
      <h2 class="font-bold mb-1">Current (Unfair)</h2>
      <p class="text-red-600">
        ${firstPerson} takes the bad time every meeting.
      </p>
    </div>
  `;

  // 🟢 RESULT
  if (result.mode === "overlap") {

    html += `
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
        <h2 class="font-bold mb-1">Better Option</h2>
        <p class="text-green-600 font-semibold">
          Your team can meet without hurting anyone 🎉
        </p>
      </div>
    `;

  } else {

    html += `
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
        <h2 class="font-bold mb-2">Fair Rotation</h2>
        <p class="text-sm text-gray-600 mb-2">
          Rotate inconvenient times so no one always suffers.
        </p>
    `;

    for (let person in result.fairness_score) {
      html += `<p>👉 ${person}: ${result.fairness_score[person]}x</p>`;
    }

    html += `<div class="mt-3 space-y-2">`;

    result.calendar_links.forEach(item => {
      html += `
        <div class="border p-2 rounded">
          <p>${item.day} → ${item.assigned_to}</p>
          <a href="${item.calendar_link}" target="_blank" class="text-blue-600 text-sm">
            Add to Calendar
          </a>
        </div>
      `;
    });

    html += `</div></div>`;

    html += `
      <div class="bg-yellow-50 p-4 rounded-xl border mt-4 text-center">
        <p class="font-bold">Stop one person always suffering → $5</p>
        <button onclick="window.location.href='premium.html'" 
          class="bg-black text-white px-4 py-2 mt-2 rounded">
          Get Early Access
        </button>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
